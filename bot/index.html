<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OKX Trading Bot — لوحة التحكم</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    header h1 { font-size: 18px; color: #f0f6fc; }
    .meta { display: flex; align-items: center; gap: 14px; font-size: 12px; color: #8b949e; }

    .badge {
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold;
    }
    .badge-demo { background: #1a3a28; color: #3fb950; border: 1px solid #3fb950; }
    .badge-live { background: #3a1a1a; color: #f85149; border: 1px solid #f85149; }

    .pulse {
      display: inline-block; width: 9px; height: 9px; border-radius: 50%;
      background: #3fb950; animation: blink 1.4s ease-in-out infinite;
      box-shadow: 0 0 6px #3fb950;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .container { max-width: 1060px; margin: 0 auto; padding: 24px 18px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 18px 16px; text-align: center;
    }
    .card .lbl { font-size: 11px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
    .card .val { font-size: 26px; font-weight: 700; }
    .c-green { color: #3fb950; }
    .c-yellow { color: #d29922; }
    .c-red { color: #f85149; }
    .c-blue { color: #58a6ff; }
    .c-white { color: #f0f6fc; }

    .box {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      margin-bottom: 18px; overflow: hidden;
    }
    .box-hd {
      padding: 12px 18px; border-bottom: 1px solid #30363d;
      font-size: 13px; font-weight: 600; color: #8b949e;
      display: flex; align-items: center; justify-content: space-between;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 10px 18px; color: #8b949e; border-bottom: 1px solid #30363d; text-align: right; font-weight: 500; }
    td { padding: 10px 18px; border-bottom: 1px solid #21262d; }
    tr:last-child td { border-bottom: none; }

    .log-wrap { padding: 10px 18px; max-height: 260px; overflow-y: auto; }
    .log-row { display: flex; gap: 14px; padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 12px; }
    .log-row:last-child { border-bottom: none; }
    .log-t { color: #8b949e; white-space: nowrap; min-width: 145px; font-size: 11px; }
    .lv-success { color: #3fb950; }
    .lv-error   { color: #f85149; }
    .lv-warning { color: #d29922; }
    .lv-info    { color: #e6edf3; }

    .empty { padding: 28px; text-align: center; color: #8b949e; font-size: 13px; }

    .refresh-bar {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      background: #161b22; border: 1px solid #30363d; border-radius: 30px;
      padding: 8px 18px; font-size: 12px; color: #8b949e;
      display: flex; align-items: center; gap: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>🤖 OKX Trading Bot</h1>
  <div class="meta">
    <span id="modeBadge" class="badge badge-demo">Demo 🧪</span>
    <span><span class="pulse"></span> يعمل على GitHub Actions</span>
    <span>آخر تحديث: <b id="lastRun">—</b></span>
  </div>
</header>

<div class="container">

  <div class="grid">
    <div class="card">
      <div class="lbl">الرصيد</div>
      <div class="val c-green" id="balance">—</div>
      <div class="lbl" style="margin-top:4px;">USDT</div>
    </div>
    <div class="card">
      <div class="lbl">صفقات مفتوحة</div>
      <div class="val c-yellow" id="openPos">—</div>
    </div>
    <div class="card">
      <div class="lbl">إجمالي الصفقات</div>
      <div class="val c-white" id="totalTrades">—</div>
    </div>
    <div class="card">
      <div class="lbl">الرافعة</div>
      <div class="val c-blue">20x</div>
    </div>
    <div class="card">
      <div class="lbl">وقف الخسارة</div>
      <div class="val c-red">2%</div>
    </div>
    <div class="card">
      <div class="lbl">جني الأرباح</div>
      <div class="val c-green">4%</div>
    </div>
  </div>

  <div class="box">
    <div class="box-hd">📊 الصفقات المفتوحة</div>
    <div id="posTable">
      <div class="empty">لا توجد صفقات مفتوحة حالياً</div>
    </div>
  </div>

  <div class="box">
    <div class="box-hd">
      <span>📋 سجل العمليات</span>
      <span id="nextRefresh" style="font-size:11px;font-weight:normal;color:#8b949e;"></span>
    </div>
    <div class="log-wrap" id="logList">
      <div class="empty">في انتظار البيانات...</div>
    </div>
  </div>

</div>

<div class="refresh-bar">
  <span class="pulse" style="width:7px;height:7px;"></span>
  يتحدث تلقائياً كل 30 ثانية
</div>

<script>
const STATUS_URL = '/bot_status.json';
let countdown = 30;

async function fetchStatus() {
  try {
    const r = await fetch(STATUS_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('fetch failed');
    const d = await r.json();

    document.getElementById('balance').textContent = (d.balance || 0).toFixed(4);
    document.getElementById('openPos').textContent = (d.positions || []).length;
    document.getElementById('totalTrades').textContent = d.total_trades || 0;
    document.getElementById('lastRun').textContent = d.last_run || '—';

    const badge = document.getElementById('modeBadge');
    badge.textContent = d.mode || 'Demo 🧪';
    badge.className = 'badge ' + (d.mode && d.mode.includes('Live') ? 'badge-live' : 'badge-demo');

    // Positions
    const posDiv = document.getElementById('posTable');
    if (d.positions && d.positions.length > 0) {
      let html = '<table><thead><tr><th>الزوج</th><th>الاتجاه</th><th>الحجم</th><th>سعر الدخول</th><th>ر/خ غير محقق</th></tr></thead><tbody>';
      d.positions.forEach(p => {
        const pnlCls = p.pnl >= 0 ? 'c-green' : 'c-red';
        html += `<tr><td><b>${p.instId}</b></td><td>${p.side}</td><td>${p.size}</td><td>${p.entry.toFixed(4)}</td><td class="${pnlCls}">${p.pnl > 0 ? '+' : ''}${p.pnl} USDT</td></tr>`;
      });
      html += '</tbody></table>';
      posDiv.innerHTML = html;
    } else {
      posDiv.innerHTML = '<div class="empty">لا توجد صفقات مفتوحة حالياً</div>';
    }

    // Logs
    const logDiv = document.getElementById('logList');
    if (d.logs && d.logs.length > 0) {
      logDiv.innerHTML = d.logs.map(l =>
        `<div class="log-row"><span class="log-t">${l.time}</span><span class="lv-${l.level}">${l.msg}</span></div>`
      ).join('');
    } else {
      logDiv.innerHTML = '<div class="empty">لا توجد سجلات بعد</div>';
    }

  } catch (e) {
    console.error('Status fetch error:', e);
  }
}

function tick() {
  countdown--;
  document.getElementById('nextRefresh').textContent = `تحديث بعد ${countdown}ث`;
  if (countdown <= 0) {
    countdown = 30;
    fetchStatus();
  }
}

fetchStatus();
setInterval(tick, 1000);
</script>
</body>
</html>
