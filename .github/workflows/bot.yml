name: OKX Trading Bot — Snowball v22

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: okx_bot/requirements.txt

      - name: Install dependencies
        run: pip install -r okx_bot/requirements.txt

      - name: Run Snowball v22 + Brain
        env:
          OKX_API_KEY:    ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_SECRET_KEY: ${{ secrets.OKX_API_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          OKX_IS_DEMO:    ${{ secrets.OKX_IS_DEMO }}
          RISK_MODE:      ${{ secrets.RISK_MODE }}
        run: python okx_bot/run_once.py

      - name: Save state to repo
        run: |
          git config --local user.email "snowball-bot@github-actions"
          git config --local user.name "Snowball Bot"
          git fetch origin main
          git reset --soft origin/main
          git add bot_status.json brain_memory.json okx_bot/snowball_v19.db || true
          git diff --staged --quiet || git commit -m "bot: Snowball cycle update [skip ci]"
          git push origin HEAD:main
