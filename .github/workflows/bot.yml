name: OKX Trading Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:          # Manual trigger from GitHub

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: okx_bot/requirements.txt

      - name: Install dependencies
        run: pip install -r okx_bot/requirements.txt

      - name: Run trading bot
        env:
          OKX_API_KEY:    ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          OKX_IS_DEMO:    ${{ secrets.OKX_IS_DEMO }}
        run: python okx_bot/run_once.py

      - name: Commit status update
        run: |
          git config --local user.email "okx-bot@github-actions"
          git config --local user.name "OKX Bot"
          git add bot_status.json
          git diff --staged --quiet || git commit -m "bot: update status [skip ci]"
          git push
